<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CargoFlow Logistics - Tracking</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#f4f6f8;
}

header {
  background:#1abc9c;
  color:white;
  text-align:center;
  padding:30px 10px;
}

main {
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

input, button {
  padding:12px;
  margin:5px;
  font-size:1em;
}

button {
  background:#1abc9c;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.status-box {
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:8px;
  width:100%;
  max-width:400px;
}

#map {
  width:100%;
  height:400px;
  margin-top:20px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <h1>CargoFlow Logistics</h1>
  <p>Track your shipment in real time</p>
</header>

<main>

<input type="text" id="trackingNumber" placeholder="Enter tracking number">
<button onclick="trackShipment()">Track</button>

<div id="result" class="status-box" style="display:none;"></div>

<div id="map"></div>

</main>

<script>

let map;
let marker;

// Initialize Google Map
function initMap() {
  const defaultLocation = { lat: 40.4168, lng: -3.7038 }; // Madrid
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 5,
    center: defaultLocation,
  });

  marker = new google.maps.Marker({
    position: defaultLocation,
    map: map
  });
}

// Track shipment
async function trackShipment() {
  const tn = document.getElementById('trackingNumber').value.trim().toUpperCase();
  const resultDiv = document.getElementById('result');

  try {
    const res = await fetch(`https://cargoflow-logistics.onrender.com/track/${tn}`);

    if(res.ok){
      const data = await res.json();

      let historyHtml = '';
      if(data.history && data.history.length){
        historyHtml = '<h3>History:</h3><ul>';
        data.history.forEach(h => {
          historyHtml += `<li>${h.date}: ${h.status} at ${h.location}</li>`;
        });
        historyHtml += '</ul>';
      }

      resultDiv.innerHTML = `
        <p><strong>Tracking Number:</strong> ${tn}</p>
        <p><strong>Status:</strong> ${data.status}</p>
        <p><strong>Last Location:</strong> ${data.last_location}</p>
        ${historyHtml}
      `;

      // Update map if coordinates exist
      if(data.lat && data.lng){
        const location = { lat: data.lat, lng: data.lng };

        map.setCenter(location);
        map.setZoom(6);

        marker.setPosition(location);
      }

    } else {
      resultDiv.innerHTML = `<p style="color:red;">Tracking number not found</p>`;
    }

  } catch(err){
    resultDiv.innerHTML = `<p style="color:red;">Error connecting to server</p>`;
  }

  resultDiv.style.display = 'block';
}

</script>

<!-- Google Maps API -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAUREVtZFRPAdALNFSyrsMd0Wb2ps3FstU&callback=initMap">
</script>

</body>
</html>
