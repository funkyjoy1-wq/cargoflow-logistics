<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CargoFlow Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>CargoFlow Admin Panel</h1>
  <p>Add or update shipments with locations</p>
</header>

<main>
  <section class="admin-section">

    <!-- ADD SHIPMENT -->
    <h2>Add Shipment</h2>
    <input type="text" id="newTracking" placeholder="Tracking Number">
    <input type="text" id="newStatus" placeholder="Status">
    <input type="text" id="newLocation" placeholder="Location">
    <input type="date" id="newDate" placeholder="Estimated Delivery">
    <input type="text" id="newLat" placeholder="Latitude">
    <input type="text" id="newLng" placeholder="Longitude">
    <button onclick="addShipment()">Add Shipment</button>

    <!-- UPDATE SHIPMENT -->
    <h2>Update Shipment</h2>
    <input type="text" id="updTracking" placeholder="Tracking Number">
    <input type="text" id="updStatus" placeholder="New Status">
    <input type="text" id="updLocation" placeholder="New Location">
    <input type="date" id="updDate" placeholder="Date">
    <input type="text" id="updLat" placeholder="Latitude">
    <input type="text" id="updLng" placeholder="Longitude">
    <button onclick="updateShipment()">Update Shipment</button>

    <div id="message" class="status-box" style="display:none;"></div>
  </section>
</main>

<script>
/* ================= ADD NEW SHIPMENT ================= */
async function addShipment() {
  const tracking_number = document.getElementById('newTracking').value.trim().toUpperCase();
  const status = document.getElementById('newStatus').value.trim();
  const last_location = document.getElementById('newLocation').value.trim();
  const estimated_delivery = document.getElementById('newDate').value;
  const lat = document.getElementById('newLat').value.trim();
  const lng = document.getElementById('newLng').value.trim();
  const msgDiv = document.getElementById('message');

  if (!tracking_number || !lat || !lng) {
    msgDiv.innerHTML = 'Tracking number and coordinates are required!';
    msgDiv.style.display = 'block';
    return;
  }

  const res = await fetch('http://localhost:3000/shipments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tracking_number, status, last_location, estimated_delivery, lat, lng })
  });

  const data = await res.json();
  msgDiv.innerHTML = data.message;
  msgDiv.style.display = 'block';
}

/* ================= UPDATE EXISTING SHIPMENT ================= */
async function updateShipment() {
  const tracking_number = document.getElementById('updTracking').value.trim().toUpperCase();
  const status = document.getElementById('updStatus').value.trim();
  const last_location = document.getElementById('updLocation').value.trim();
  const date = document.getElementById('updDate').value;
  const lat = document.getElementById('updLat').value.trim();
  const lng = document.getElementById('updLng').value.trim();
  const msgDiv = document.getElementById('message');

  if (!tracking_number) {
    msgDiv.innerHTML = 'Tracking number is required!';
    msgDiv.style.display = 'block';
    return;
  }

  const res = await fetch(`http://localhost:3000/shipments/${tracking_number}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status, last_location, date, lat, lng })
  });

  const data = await res.json();
  msgDiv.innerHTML = data.message || data.error;
  msgDiv.style.display = 'block';
}
</script>

</body>
</html>
